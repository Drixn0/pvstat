services:
  server:
    build:
      context: ./server
    container_name: pvstat-server
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_PATH: /data/pv.db
      APP_VERSION: 2.0.0
      HEALTHCHECK_DB: "true"
      ALLOWED_ORIGIN: "*"
      JSON_BODY_LIMIT: 256kb
      DB_BUSY_TIMEOUT_MS: 5000
      DB_JOURNAL_MODE: WAL
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: changeme123
      AUTH_SECRET: replace-with-a-long-random-secret
      AUTH_TOKEN_TTL_HOURS: 24
    volumes:
      - pvstat-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/live').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    build:
      context: ./web
    container_name: pvstat-web
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pvstat-data:
